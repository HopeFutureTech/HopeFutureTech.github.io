# Deploy static site with Git LFS files expanded (APK etc.).
# GitHub Pages “Deploy from branch” only publishes LFS *pointer* files (~134B).
# After merging, set: Settings → Pages → Build: GitHub Actions (disable branch deploy).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with Git LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Prepare site (exclude VCS metadata)
        run: |
          mkdir -p _site
          rsync -a \
            --exclude=.git \
            --exclude=.github \
            --exclude=_site \
            ./ _site/

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
